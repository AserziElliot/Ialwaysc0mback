<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>DevWeb Studio & Browser</title>
    <style>
        :root { --p-blue: #3498db; --p-dark: #2c3e50; }
        body { font-family: sans-serif; margin: 0; display: flex; height: 100vh; background: #eee; }
        
        /* --- EDITOR (Izquierda) --- */
        #editor { width: 350px; background: #fff; border-right: 2px solid #ccc; padding: 20px; overflow-y: auto; }
        .tool-group { margin-bottom: 15px; padding: 10px; border: 1px solid #ddd; border-radius: 8px; }
        input, select, button { width: 100%; margin: 5px 0; padding: 8px; box-sizing: border-box; }
        button { cursor: pointer; background: var(--p-blue); color: white; border: none; border-radius: 4px; }
        button:hover { opacity: 0.9; }

        /* --- NAVEGADOR (Derecha) --- */
        #browser-container { flex-grow: 1; display: flex; flex-direction: column; background: #333; padding: 20px; }
        .address-bar { background: #eee; padding: 10px; display: flex; border-radius: 10px 10px 0 0; }
        #url-input { flex-grow: 1; border: 1px solid #ccc; border-radius: 20px; padding: 5px 15px; }
        
        #viewport { background: white; flex-grow: 1; overflow-y: auto; padding: 20px; position: relative; }

        /* --- ELEMENTOS DINÁMICOS --- */
        .union-box { border: 2px solid var(--p-blue); padding: 15px; border-radius: 10px; background: #f0f8ff; margin: 10px 0; }
        .user-img { max-width: 100%; border-radius: 8px; }
        .user-btn { padding: 10px 20px; background: #27ae60; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <div id="editor">
        <h2>🛠️ Creador .dev</h2>
        <input type="text" id="new-domain" placeholder="nombre-del-sitio (sin .dev)">
        <hr>
        
        <div class="tool-group">
            <label>Añadir Elemento:</label>
            <select id="el-type">
                <option value="text">Texto (Párrafo)</option>
                <option value="title">Título (H1)</option>
                <option value="image">Imagen (URL)</option>
                <option value="link">Enlace (URL)</option>
                <option value="button">Botón</option>
                <option value="union">Unión (Caja + Texto)</option>
            </select>
            <input type="text" id="el-content" placeholder="Contenido o Texto">
            <input type="text" id="el-extra" placeholder="URL o Link (si aplica)">
            <button onclick="addElement()">Añadir a la página</button>
        </div>

        <button style="background: #e67e22;" onclick="savePage()">💾 Publicar Sitio .dev</button>
        <div id="status-msg" style="margin-top:10px; font-size:12px; color: green;"></div>
    </div>

    <div id="browser-container">
        <div class="address-bar">
            <input type="text" id="url-input" placeholder="Escribe algo.dev y pulsa Enter">
        </div>
        <div id="viewport">
            <h1 style="color:#ccc; text-align:center; margin-top:100px;">Escribe una URL para empezar</h1>
        </div>
    </div>

<script>
    let currentPageElements = [];
    const viewport = document.getElementById('viewport');

    // 1. Añadir elementos al "borrador"
    function addElement() {
        const type = document.getElementById('el-type').value;
        const content = document.getElementById('el-content').value;
        const extra = document.getElementById('el-extra').value;

        const elementData = { type, content, extra };
        currentPageElements.push(elementData);
        renderPreview();
    }

    // 2. Dibujar la vista previa en el viewport
    function renderPreview() {
        viewport.innerHTML = "";
        currentPageElements.forEach(el => {
            if(el.type === 'title') viewport.innerHTML += `<h1>${el.content}</h1>`;
            if(el.type === 'text') viewport.innerHTML += `<p>${el.content}</p>`;
            if(el.type === 'image') viewport.innerHTML += `<img src="${el.extra}" class="user-img" alt="${el.content}">`;
            if(el.type === 'link') viewport.innerHTML += `<a href="#" onclick="alert('Link a: ${el.extra}')">${el.content}</a><br>`;
            if(el.type === 'button') viewport.innerHTML += `<button class="user-btn">${el.content}</button>`;
            if(el.type === 'union') viewport.innerHTML += `<div class="union-box"><h3>${el.content}</h3><p>${el.extra}</p></div>`;
        });
    }

    // 3. Guardar en el "Servidor" (LocalStorage)
    function savePage() {
        const domain = document.getElementById('new-domain').value.toLowerCase().trim();
        if(!domain) return alert("Ponle un nombre a tu dominio");
        
        const fullDomain = domain.endsWith('.dev') ? domain : domain + ".dev";
        const allPages = JSON.parse(localStorage.getItem('devWeb_Pages') || '{}');
        
        allPages[fullDomain] = currentPageElements;
        localStorage.setItem('devWeb_Pages', JSON.stringify(allPages));
        
        document.getElementById('status-msg').innerText = `¡Sitio ${fullDomain} publicado con éxito!`;
        currentPageElements = []; // Limpiar editor
    }

    // 4. Sistema de Navegación
    document.getElementById('url-input').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            const url = this.value.toLowerCase().trim();
            const allPages = JSON.parse(localStorage.getItem('devWeb_Pages') || '{}');
            
            if (allPages[url]) {
                currentPageElements = allPages[url];
                renderPreview();
            } else {
                viewport.innerHTML = `<h2 style="color:red">Error 404: La web ${url} no existe en DevWeb.</h2>`;
            }
        }
    });
</script>

</body>
</html>
